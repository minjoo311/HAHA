name: 매크로 대시보드 일일 갱신

on:
  schedule:
    # 매일 한국시간(KST) 오전 7시 = UTC 전날 22시
    - cron: '0 22 * * *'
  workflow_dispatch: {}  # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 데이터 수집
        run: python scripts/fetch_data.py

    - name: 변경사항 커밋
        run: |
          git config user.name "macro-dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          if [ -f docs/data_prev.json ]; then
            git add docs/data_prev.json
          fi
          git diff --quiet --cached || git commit -m "데이터 자동 갱신 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
