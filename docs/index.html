<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장전 매크로 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0;
    --panel:#FFFFFF;
    --panel-line:#F2E6D8;
    --text:#2D2A32;
    --text-dim:#8B8589;
    --text-faint:#C2B8C4;
    --coral:#FF6F61;
    --coral-bg:#FFE8E4;
    --lavender:#B8A9F0;
    --lavender-bg:#EFE9FC;
    --mint:#4FBA9A;
    --mint-bg:#DCF5EC;
    --yellow:#F2B73B;
    --yellow-bg:#FDF0DA;
    --blue:#5B9BD9;
    --blue-bg:#E3F0FB;
    --up:#FF6F61;
    --down:#5B9BD9;
    --flat:#B5ADB8;
    --mono:'JetBrains Mono', monospace;
    --sans:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    --display:'Baloo 2', 'Pretendard', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:var(--sans);}
  body{
    padding: 24px 16px 80px;
    max-width: 1180px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}

  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    padding-bottom: 18px;
    margin-bottom: 20px;
  }
  .header h1{
    font-family: var(--display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .header h1 .sparkle{ color: var(--coral); }
  .header .sub{ font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }
  .updated{
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-faint);
    text-align: right;
    background: var(--panel);
    border: 1.5px solid var(--panel-line);
    border-radius: 20px;
    padding: 6px 14px;
  }
  .updated .stale{ color: var(--coral); }

  .interpretation-section{ margin-bottom: 28px; }
  .interpretation-title{
    font-family: var(--display);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .interpretation-title .count{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    font-weight: 500;
    background: var(--panel-line);
    border-radius: 20px;
    padding: 3px 10px;
  }
  .insight-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .insight-card{
    border-radius: 18px;
    padding: 16px 18px;
    position: relative;
    transform: rotate(var(--tilt, 0deg));
    transition: transform 0.15s ease;
  }
  .insight-card:hover{ transform: rotate(0deg) scale(1.02); }
  .insight-card.neutral{ background: var(--lavender-bg); }
  .insight-card.watch{ background: var(--yellow-bg); }
  .insight-card.alert{ background: var(--coral-bg); }
  .insight-card .tag{
    display:inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 0.03em;
  }
  .insight-card.neutral .tag{ background: var(--lavender); color: #fff; }
  .insight-card.watch .tag{ background: var(--yellow); color: #5C4404; }
  .insight-card.alert .tag{ background: var(--coral); color: #fff; }
  .insight-card .headline{
    font-family: var(--display);
    font-size: 15.5px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  .insight-card .detail{ font-size: 12.5px; color: var(--text-dim); line-height: 1.55; }
  .insight-empty{
    text-align:center;
    padding: 32px 20px;
    color: var(--text-faint);
    font-size: 13px;
    background: var(--panel);
    border: 2px dashed var(--panel-line);
    border-radius: 18px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 16px;
  }
  section.panel{
    background: var(--panel);
    border: 1.5px solid var(--panel-line);
    border-radius: 18px;
    overflow:hidden;
  }
  .panel-title{
    font-family: var(--display);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    padding: 12px 16px 10px;
    border-bottom: 1.5px solid var(--panel-line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--panel-line);
    gap: 10px;
  }
  .row:last-child{border-bottom:none;}
  .row .name{ font-size: 13.5px; color: var(--text); white-space:nowrap; display:flex; align-items:center; gap:6px; font-weight: 500; }
  .row .manual-dot{ width: 6px; height: 6px; border-radius: 50%; background: var(--lavender); flex-shrink: 0; }
  .row .value-block{ display:flex; align-items:center; gap: 8px; font-family: var(--mono); white-space:nowrap; }
  .row .value{ font-size: 13.5px; font-weight: 700; color: var(--text); }
  .row .delta{ font-size: 11px; font-weight: 600; min-width: 50px; text-align:right; }
  .delta.up{color:var(--up);} .delta.down{color:var(--down);} .delta.flat{color:var(--flat);}
  .value.na, .delta.na{color:var(--text-faint); font-weight:500;}

  .row .manual-input{
    width: 88px;
    background: var(--lavender-bg);
    border: 1.5px solid var(--lavender);
    border-radius: 10px;
    color: #6B5BC4;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 12.5px;
    padding: 5px 9px;
    text-align: right;
  }
  .row .manual-input:focus{ outline: none; background: #fff; }
  .row .manual-input::placeholder{ color: var(--text-faint); font-weight: 400; }

  .section-heading{
    font-family: var(--display);
    font-size: 15px; font-weight: 600; color: var(--text);
    margin: 24px 0 10px;
    display:flex; align-items:center; gap: 10px;
  }
  .section-heading .legend{
    font-family: var(--sans);
    font-size: 10.5px; font-weight: 500; color: var(--text-faint);
    display:flex; align-items:center; gap: 5px;
  }
  .legend .manual-dot{ width:6px; height:6px; border-radius:50%; background:var(--lavender); }

  footer{
    margin-top: 36px; padding: 16px 18px;
    background: var(--panel); border: 1.5px solid var(--panel-line); border-radius: 16px;
    font-size: 11.5px; color: var(--text-dim); line-height:1.6;
  }
  footer .reset-btn{
    background: var(--coral-bg); border: 1.5px solid var(--coral); color: #C9402F;
    border-radius: 20px; padding: 6px 14px; font-size: 11.5px; font-weight: 600; margin-top: 10px;
  }
  footer .reset-btn:hover{ background: var(--coral); color: #fff; }

  @media (max-width: 600px){
    .header{flex-direction:column; align-items:flex-start;}
    .updated{text-align:left;}
  }
</style>
</head>
<body>

  <div class="header">
    <div>
      <h1><span class="sparkle">✺</span> 장전 매크로 대시보드</h1>
      <div class="sub">오늘 시장, 한눈에 훑어보기</div>
    </div>
    <div class="updated" id="updated-at">불러오는 중...</div>
  </div>

  <div class="interpretation-section">
    <div class="interpretation-title">오늘의 해석 <span class="count" id="insight-count"></span></div>
    <div class="insight-grid" id="insight-list"></div>
  </div>

  <div class="section-heading">환율 · 통화</div>
  <div class="grid" id="grid-fx"></div>

  <div class="section-heading">금리 · 채권 (%) <span class="legend"><span class="manual-dot"></span> 직접 입력 가능</span></div>
  <div class="grid" id="grid-rates"></div>

  <div class="section-heading">원자재 · 에너지 / 농산물 <span class="legend"><span class="manual-dot"></span> 직접 입력 가능</span></div>
  <div class="grid" id="grid-commodity-agri"></div>

  <div class="section-heading">암호화폐 · 변동성</div>
  <div class="grid" id="grid-crypto-vol"></div>

  <div class="section-heading">미국 증시</div>
  <div class="grid" id="grid-us-eq"></div>

  <div class="section-heading">글로벌 증시 <span class="legend"><span class="manual-dot"></span> 직접 입력 가능</span></div>
  <div class="grid" id="grid-global-eq"></div>

  <footer id="footer-note">
    자동 항목 출처: Twelve Data (무료 플랜, 약 15분 지연). 직접 입력 항목은 이 기기·이 브라우저에만 저장됩니다.<br>
    "N/A"는 자동 수집 실패 항목, 빈 입력칸은 아직 입력하지 않은 항목입니다.<br>
    <button class="reset-btn" id="reset-manual">직접 입력 데이터 모두 지우기</button>
  </footer>

<script>
const GROUP_TARGETS = {
  fx: 'grid-fx', rates: 'grid-rates', commodity: 'grid-commodity-agri', agri: 'grid-commodity-agri',
  crypto: 'grid-crypto-vol', vol: 'grid-crypto-vol', us_eq: 'grid-us-eq', global_eq: 'grid-global-eq',
};
const GROUP_LABELS = {
  fx: '환율', rates: '금리', commodity: '원자재', agri: '농산물',
  crypto: '암호화폐', vol: '변동성', us_eq: '미국 증시', global_eq: '글로벌 증시',
};

const MANUAL_ITEMS = [
  '달러지수 (DXY)', '미국 10년물', '미국 30년물', '일본 10년물', '한국 10년물', '독일 10년물',
  'WTI 유가', '브렌트유', '천연가스', '미국 소맥(밀)', '미국 옥수수', '미국 대두',
  'Euro Stoxx 50', '항셍지수', '대만 가권지수',
];

const STORAGE_KEY = 'macro_dashboard_manual_v1';

function loadManualData(){
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }
  catch(e){ return {}; }
}
function saveManualData(data){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
}

function fmtValue(v, group){
  if (v === null || v === undefined || v === '') return null;
  if (group === 'rates') return parseFloat(v).toFixed(2) + '%';
  if (v >= 1000) return Number(v).toLocaleString('en-US', {maximumFractionDigits: 2});
  if (v >= 1) return Number(v).toFixed(2);
  return Number(v).toFixed(4);
}

function getDelta(item, prevMap){
  const prev = prevMap[item.name];
  if (!item.ok || item.value === null || !prev || !prev.ok || !prev.value) return null;
  const diff = item.value - prev.value;
  const pct = (diff / prev.value) * 100;
  const dir = diff > 0.0000001 ? 'up' : diff < -0.0000001 ? 'down' : 'flat';
  return { pct, dir };
}

function buildRow(item, prevMap, manualData){
  const row = document.createElement('div');
  row.className = 'row';
  const isManualEligible = MANUAL_ITEMS.includes(item.name);
  const manualValue = manualData[item.name];

  const name = document.createElement('div');
  name.className = 'name';
  if (isManualEligible) {
    const dot = document.createElement('span');
    dot.className = 'manual-dot';
    name.appendChild(dot);
  }
  name.appendChild(document.createTextNode(item.name));
  row.appendChild(name);

  const valueBlock = document.createElement('div');
  valueBlock.className = 'value-block';

  if (item.ok && item.value !== null) {
    const value = document.createElement('span');
    value.className = 'value';
    value.textContent = fmtValue(item.value, item.group);
    valueBlock.appendChild(value);

    const delta = document.createElement('span');
    const d = getDelta(item, prevMap);
    if (d){
      delta.className = 'delta ' + d.dir;
      const arrow = d.dir === 'up' ? '▲' : d.dir === 'down' ? '▼' : '–';
      delta.textContent = `${arrow} ${Math.abs(d.pct).toFixed(2)}%`;
    } else {
      delta.className = 'delta na';
      delta.textContent = '–';
    }
    valueBlock.appendChild(delta);
  } else if (isManualEligible) {
    const input = document.createElement('input');
    input.className = 'manual-input';
    input.type = 'number';
    input.step = 'any';
    input.placeholder = '값 입력';
    if (manualValue !== undefined) input.value = manualValue;
    input.addEventListener('change', () => {
      const data = loadManualData();
      if (input.value === '') { delete data[item.name]; }
      else { data[item.name] = parseFloat(input.value); }
      saveManualData(data);
      renderAll();
    });
    valueBlock.appendChild(input);
  } else {
    const value = document.createElement('span');
    value.className = 'value na';
    value.textContent = 'N/A';
    valueBlock.appendChild(value);
  }
  row.appendChild(valueBlock);
  return row;
}

function getValue(items, manualData, name){
  const item = items.find(i => i.name === name);
  if (item && item.ok && item.value !== null) return item.value;
  if (MANUAL_ITEMS.includes(name) && manualData[name] !== undefined) return manualData[name];
  return null;
}

function getItemDelta(items, prevMap, name){
  const item = items.find(i => i.name === name);
  if (!item) return null;
  return getDelta(item, prevMap);
}

// 해석 엔진: 자동 수집만으로도 작동하는 규칙을 우선 배치하고,
// 수동 입력이 추가되면 더 정교한 규칙이 추가로 발동한다.
function buildInsights(items, prevMap, manualData){
  const insights = [];
  const v = (name) => getValue(items, manualData, name);
  const d = (name) => getItemDelta(items, prevMap, name);

  // 1. USD/KRW 단독 변화 (자동 수집만으로 작동)
  const krw = v('USD/KRW'), krwDelta = d('USD/KRW');
  if (krw !== null && krwDelta) {
    if (Math.abs(krwDelta.pct) >= 0.5) {
      insights.push({ level: krwDelta.dir === 'up' ? 'watch' : 'neutral',
        headline: krwDelta.dir === 'up' ? '원화, 한 풀 약해진 하루' : '원화, 살짝 힘준 하루',
        detail: `달러/원이 전일比 ${krwDelta.dir === 'up' ? '▲' : '▼'}${Math.abs(krwDelta.pct).toFixed(2)}% 움직였어요 (현재 ${krw.toLocaleString()}원). ${krwDelta.dir === 'up' ? '달러 강세 또는 외국인 자금 이탈 신호일 수 있어요.' : '원화 강세 또는 외국인 자금 유입 신호일 수 있어요.'}` });
    } else {
      insights.push({ level: 'neutral', headline: '원/달러, 잠잠한 하루',
        detail: `달러/원이 ${krw.toLocaleString()}원으로 전일과 큰 차이가 없어요. 환율 쪽은 특별한 이벤트 없이 지나가는 분위기예요.` });
    }
  }

  // 2. USD/JPY 흐름
  const jpy = v('USD/JPY'), jpyDelta = d('USD/JPY');
  if (jpy !== null) {
    if (jpy >= 150) {
      insights.push({ level: 'watch', headline: '엔화, 여전히 약한 편',
        detail: `달러/엔이 ${jpy.toFixed(1)}엔이에요. 150엔을 넘는 구간은 일본은행의 개입 가능성이 거론되는 레벨이라, 엔캐리 트레이드 동향을 주시할 만해요.` });
    } else {
      insights.push({ level: 'neutral', headline: '엔화, 비교적 안정',
        detail: `달러/엔이 ${jpy.toFixed(1)}엔으로, 개입 경계 구간보다는 낮은 수준이에요.` });
    }
  }

  // 3. 금 가격 단독
  const gold = v('금 (Gold)'), goldDelta = d('금 (Gold)');
  if (gold !== null) {
    if (goldDelta && Math.abs(goldDelta.pct) >= 1.0) {
      insights.push({ level: goldDelta.dir === 'up' ? 'watch' : 'neutral',
        headline: goldDelta.dir === 'up' ? '금값, 안전자산 수요 ↑' : '금값, 차분해진 하루',
        detail: `금이 전일比 ${goldDelta.dir === 'up' ? '▲' : '▼'}${Math.abs(goldDelta.pct).toFixed(2)}% 움직여 $${gold.toLocaleString()}예요. ${goldDelta.dir === 'up' ? '시장이 불확실성을 가격에 반영하며 안전자산을 찾고 있다는 신호일 수 있어요.' : '위험 회피 심리가 다소 완화된 모습이에요.'}` });
    } else {
      insights.push({ level: 'neutral', headline: '금값, 큰 변화 없음',
        detail: `금이 $${gold.toLocaleString()} 부근에서 잠잠하게 움직이고 있어요.` });
    }
  }

  // 4. 비트코인
  const btc = v('비트코인'), btcDelta = d('비트코인');
  if (btc !== null && btcDelta) {
    if (Math.abs(btcDelta.pct) >= 3.0) {
      insights.push({ level: btcDelta.dir === 'up' ? 'neutral' : 'watch',
        headline: btcDelta.dir === 'up' ? '비트코인, 위험자산 선호 ↑' : '비트코인, 위험자산 회피 분위기',
        detail: `비트코인이 전일比 ${btcDelta.dir === 'up' ? '▲' : '▼'}${Math.abs(btcDelta.pct).toFixed(2)}% 움직여 $${btc.toLocaleString()}예요. 암호화폐는 위험자산 선호도의 빠른 바로미터로 자주 쓰여요.` });
    }
  }

  // 5. 원화 + 엔화 동행 (둘 다 자동 수집 항목)
  if (krwDelta && jpyDelta && krwDelta.dir === jpyDelta.dir && Math.abs(krwDelta.pct) >= 0.3 && Math.abs(jpyDelta.pct) >= 0.3) {
    insights.push({ level: 'watch', headline: '아시아 통화, 같은 방향으로 흔들림',
      detail: `원화와 엔화가 같은 방향(${krwDelta.dir === 'up' ? '동반 약세' : '동반 강세'})으로 움직이고 있어요. 개별 통화 이슈보다 달러 자체의 힘이 아시아 통화 전반에 영향을 주고 있을 가능성이 있어요.` });
  }

  // ===== 아래부터는 수동 입력이 있어야 발동하는 더 정교한 규칙 =====

  // 6. 미국 국채 10년-30년 스프레드
  const us10 = v('미국 10년물'), us30 = v('미국 30년물');
  if (us10 !== null && us30 !== null) {
    const spread = us30 - us10;
    if (spread < 0) {
      insights.push({ level: 'alert', headline: '미국 장기채 금리 역전',
        detail: `30년물(${us30.toFixed(2)}%)이 10년물(${us10.toFixed(2)}%)보다 낮아요. 장기 성장 둔화 우려가 반영된 구간일 수 있어요.` });
    } else if (spread < 0.15) {
      insights.push({ level: 'watch', headline: '미국 국채 커브 평탄화',
        detail: `10년-30년 스프레드가 ${spread.toFixed(2)}%p로 좁아요. 장기 성장 기대가 둔화되고 있을 가능성을 시사해요.` });
    } else {
      insights.push({ level: 'neutral', headline: '미국 국채 커브 정상 형태',
        detail: `30년물이 10년물보다 ${spread.toFixed(2)}%p 높은, 정상적인 우상향 커브예요.` });
    }
  }

  // 7. 금 + 미국채10년
  if (gold !== null && us10 !== null) {
    if (us10 < 4.0 && gold > 3000) {
      insights.push({ level: 'watch', headline: '안전자산 동시 강세',
        detail: `금 $${gold.toLocaleString()}, 미국채 10년물 ${us10.toFixed(2)}%로 낮은 수준이에요. 위험회피(리스크오프) 심리가 우세할 수 있어요.` });
    }
  }

  // 8. VIX
  const vix = v('VIX 지수');
  if (vix !== null) {
    if (vix >= 25) {
      insights.push({ level: 'alert', headline: 'VIX 고조, 시장 불안 신호',
        detail: `VIX가 ${vix.toFixed(1)}로 평소보다 높아요. 통상 20을 넘으면 단기 변동성 확대 구간으로 봐요.` });
    } else if (vix <= 13) {
      insights.push({ level: 'neutral', headline: 'VIX 저점, 시장 안정',
        detail: `VIX가 ${vix.toFixed(1)}로 낮아요. 시장이 단기적으로 안정적이라는 신호예요.` });
    }
  }

  // 9. DXY + 원/달러
  const dxy = v('달러지수 (DXY)');
  if (dxy !== null && krw !== null) {
    insights.push({ level: 'neutral', headline: '달러 강세/약세 흐름 체크',
      detail: `DXY ${dxy.toFixed(2)}, 원/달러 ${krw.toLocaleString()}원. 두 지표가 같은 방향으로 가면 달러 강세가 원화에도 일관되게 반영되고 있다는 뜻이에요.` });
  }

  // 10. WTI-브렌트 스프레드
  const wti = v('WTI 유가'), brent = v('브렌트유');
  if (wti !== null && brent !== null) {
    const spread = brent - wti;
    insights.push({ level: 'neutral', headline: 'WTI-브렌트 스프레드',
      detail: `브렌트유가 WTI보다 $${spread.toFixed(2)} 높아요. 통상 국제 운송·지정학 리스크가 브렌트에 더 크게 반영되는 편이에요.` });
  }

  // 11. 한미 금리차
  const kr10 = v('한국 10년물');
  if (kr10 !== null && us10 !== null) {
    const diff = us10 - kr10;
    if (diff > 1.0) {
      insights.push({ level: 'watch', headline: '한미 금리차 확대',
        detail: `미국 10년물(${us10.toFixed(2)}%)이 한국 10년물(${kr10.toFixed(2)}%)보다 ${diff.toFixed(2)}%p 높아요. 원화 약세 압력 요인으로 작용할 수 있어요.` });
    }
  }

  return insights;
}

const TILTS = [-1.2, 0.8, -0.6, 1.4, -1.8, 0.5];

function renderInsights(items, prevMap, manualData){
  const insights = buildInsights(items, prevMap, manualData);
  const list = document.getElementById('insight-list');
  const countEl = document.getElementById('insight-count');
  list.innerHTML = '';

  if (insights.length === 0) {
    list.innerHTML = '<div class="insight-empty">아직 자동 데이터가 도착하지 않았어요. 잠시 후 새로고침 해보세요 🍃</div>';
    countEl.textContent = '';
    return;
  }
  countEl.textContent = `${insights.length}건`;
  insights.forEach((ins, i) => {
    const card = document.createElement('div');
    card.className = 'insight-card ' + ins.level;
    card.style.setProperty('--tilt', TILTS[i % TILTS.length] + 'deg');
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = ins.level === 'alert' ? '주의' : ins.level === 'watch' ? '관찰' : '참고';
    card.appendChild(tag);
    const headline = document.createElement('div');
    headline.className = 'headline';
    headline.textContent = ins.headline;
    card.appendChild(headline);
    const detail = document.createElement('div');
    detail.className = 'detail';
    detail.textContent = ins.detail;
    card.appendChild(detail);
    list.appendChild(card);
  });
}

let currentData = { items: [] };
let currentPrevMap = {};

function renderAll(){
  const manualData = loadManualData();
  renderInsights(currentData.items, currentPrevMap, manualData);

  Object.values(GROUP_TARGETS).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });

  const grouped = {};
  currentData.items.forEach(item => {
    if (!grouped[item.group]) grouped[item.group] = [];
    grouped[item.group].push(item);
  });

  Object.entries(grouped).forEach(([group, items]) => {
    const targetId = GROUP_TARGETS[group];
    const target = document.getElementById(targetId);
    if (!target) return;
    let panel = target.querySelector(`[data-group="${group}"]`);
    if (!panel){
      panel = document.createElement('section');
      panel.className = 'panel';
      panel.dataset.group = group;
      const title = document.createElement('div');
      title.className = 'panel-title';
      const titleText = document.createElement('span');
      titleText.textContent = GROUP_LABELS[group] || group;
      title.appendChild(titleText);
      panel.appendChild(title);
      target.appendChild(panel);
    }
    items.forEach(item => {
      panel.appendChild(buildRow(item, currentPrevMap, manualData));
    });
  });
}

async function loadDashboard(){
  try {
    const [curRes, prevRes] = await Promise.all([
      fetch('data.json?_=' + Date.now()),
      fetch('data_prev.json?_=' + Date.now()).catch(() => null),
    ]);
    currentData = await curRes.json();
    let prev = { items: [] };
    if (prevRes && prevRes.ok) prev = await prevRes.json();
    currentPrevMap = {};
    (prev.items || []).forEach(i => { currentPrevMap[i.name] = i; });

    const updatedEl = document.getElementById('updated-at');
    const updatedDate = new Date(currentData.updated_at);
    const now = new Date();
    const hoursSince = (now - updatedDate) / 3600000;
    const dateStr = updatedDate.toLocaleString('ko-KR', { dateStyle: 'medium', timeStyle: 'short' });
    if (hoursSince > 30){
      updatedEl.innerHTML = `최종 갱신: ${dateStr}<br><span class="stale">⚠ 갱신 지연 중일 수 있어요</span>`;
    } else {
      updatedEl.textContent = `최종 갱신: ${dateStr}`;
    }

    renderAll();
  } catch (err) {
    document.getElementById('updated-at').textContent = '자동 데이터 로드 실패';
    renderAll();
    console.error(err);
  }
}

document.getElementById('reset-manual').addEventListener('click', () => {
  if (confirm('직접 입력한 데이터를 모두 삭제할까요? 이 작업은 되돌릴 수 없어요.')) {
    localStorage.removeItem(STORAGE_KEY);
    renderAll();
  }
});

loadDashboard();
</script>
